name: Update VenuePilot Signup Links

on:
  schedule:
    - cron: '0 6 * * 3'    # Every Wednesday at 6am UTC (1am EST)
  workflow_dispatch:        # Allow manual trigger

jobs:
  update-links:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update VenuePilot links
        run: node api/scripts/update-venuepilot-links.js

      - name: Seed database
        run: |
          cd api && npm install --production && node scripts/seed-database.js
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          REDIS_URL: ${{ secrets.REDIS_URL }}

      - name: Check for changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain -- api/mics.json)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated links
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/mics.json
          git commit -m "Update VenuePilot signup links"
          git push

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Subtle grid pattern */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Glow behind the number */
  .glow {
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(239,68,68,0.15) 0%, transparent 70%);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
  }

  .card {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 60px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 50px;
  }

  .logo-circle {
    width: 52px;
    height: 52px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .logo-text {
    font-size: 28px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    letter-spacing: -0.5px;
  }

  .pretext {
    font-size: 22px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-bottom: 20px;
    font-weight: 500;
  }

  .number {
    font-size: 220px;
    font-weight: 800;
    color: white;
    line-height: 1;
    letter-spacing: -8px;
    margin-bottom: 10px;
  }

  .plus {
    color: #ef4444;
  }

  .label {
    font-size: 36px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 50px;
  }

  .tagline {
    font-size: 20px;
    color: rgba(255,255,255,0.35);
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.5;
  }

  /* Mic pin decorations */
  .pins {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .pin {
    position: absolute;
    background: rgba(239,68,68,0.6);
    color: white;
    font-size: 13px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .pin.green { background: rgba(34,197,94,0.5); }
  .pin.gray { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }
  .pin.red { background: rgba(239,68,68,0.4); }

  .pin:nth-child(1) { top: 80px; left: 60px; }
  .pin:nth-child(2) { top: 140px; left: 180px; }
  .pin:nth-child(3) { top: 200px; right: 100px; }
  .pin:nth-child(4) { top: 100px; right: 60px; }
  .pin:nth-child(5) { bottom: 180px; left: 80px; }
  .pin:nth-child(6) { bottom: 120px; left: 200px; }
  .pin:nth-child(7) { bottom: 200px; right: 80px; }
  .pin:nth-child(8) { bottom: 100px; right: 170px; }
  .pin:nth-child(9) { top: 300px; left: 40px; }
  .pin:nth-child(10) { top: 280px; right: 30px; }
  .pin:nth-child(11) { bottom: 300px; left: 30px; }
  .pin:nth-child(12) { bottom: 280px; right: 50px; }
</style>
</head>
<body>
  <div class="pins">
    <div class="pin green">7p</div>
    <div class="pin gray">8p</div>
    <div class="pin red">9p</div>
    <div class="pin">6p</div>
    <div class="pin green">8p</div>
    <div class="pin gray">10p</div>
    <div class="pin">7p</div>
    <div class="pin green">9p</div>
    <div class="pin gray">5p</div>
    <div class="pin red">6p</div>
    <div class="pin">8p</div>
    <div class="pin gray">7p</div>
  </div>

  <div class="glow"></div>

  <div class="card">
    <div class="logo-row">
      <div class="logo-circle">🎤</div>
      <span class="logo-text">MicFinder NYC</span>
    </div>
    <div class="pretext">We just hit</div>
    <div class="number">100<span class="plus">+</span></div>
    <div class="label">Downloads</div>
    <div class="tagline">Find your next open mic in NYC. Every mic. Every night. One map.</div>
  </div>
</body>
</html>

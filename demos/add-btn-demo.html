<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Add-to-Night Button Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--green:#22c55e;--bg-base:#000;--bg-card:#1c1c1e;--text-primary:#fff;--text-secondary:#8e8e93;--border-subtle:rgba(255,255,255,0.08);--space-lg:16px;--space-xl:20px;--radius-full:9999px}
*{box-sizing:border-box;margin:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-base);color:var(--text-primary);display:flex;flex-direction:column;align-items:center;padding:24px 12px}
h1{font-family:'Space Grotesk',sans-serif;font-size:18px;color:#888;margin-bottom:20px;text-align:center}

/* Card — matches .stream-item from stream.css */
.stream-item{display:flex;align-items:center;padding:var(--space-lg) var(--space-xl);border-bottom:1px solid var(--border-subtle);width:100%;max-width:420px;position:relative;cursor:pointer;transition:all 0.2s}
.stream-item:active{transform:scale(0.985);opacity:0.9}

.specs-col{width:60px;display:flex;flex-direction:column;margin-right:14px;flex-shrink:0}
.start-time{font-size:19px;font-weight:700;line-height:1;display:flex;align-items:center;gap:6px}
.live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,0.6)}50%{opacity:0.8;box-shadow:0 0 0 4px rgba(34,197,94,0)}}
.stage-time{display:inline-block;margin-top:6px;font-size:13px;font-weight:600;color:var(--text-secondary);background:var(--bg-card);padding:2px 6px;border-radius:4px;width:fit-content}

.info-col{flex:1;min-width:0}
.venue-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.venue-name{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1;min-width:0}
.tag-pill{padding:4px 10px;border:1px solid #444;border-radius:4px;color:#ccc;font-size:10px;font-weight:600;letter-spacing:0.5px}
.meta-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px;font-size:11px;font-weight:500;color:#8E8E93;margin-top:6px}
.neighborhood{color:#A1A1A6;font-size:11px;font-weight:400;letter-spacing:0.06em;text-transform:uppercase}
.meta-dot{color:#555}
.price-badge{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);border-radius:6px;color:#4ade80;padding:4px 10px;font-size:11px;font-weight:600}

/* Circular add button — the new element */
.add-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(34,197,94,0.12);border:1.5px solid rgba(34,197,94,0.35);
  color:var(--green);font-size:20px;font-weight:500;line-height:1;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;margin-left:auto;
  transition:all 0.2s ease;position:relative;
}
.add-btn:hover{background:rgba(34,197,94,0.22);border-color:rgba(34,197,94,0.55);transform:scale(1.08)}
.add-btn:active{transform:scale(0.92)}
.add-btn.added{background:rgba(34,197,94,0.18);border-color:rgba(34,197,94,0.5);color:#fff;font-size:15px;pointer-events:none}
@keyframes popIn{0%{transform:scale(1)}40%{transform:scale(1.2)}100%{transform:scale(1)}}
.add-btn.added{animation:popIn 0.3s ease}

/* Action column */
.action-col{margin-left:10px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.icon-btn{width:44px;height:44px;border-radius:50%;background:#1C1C1E;display:flex;align-items:center;justify-content:center;color:#A1A1A6;cursor:pointer;text-decoration:none;border:none;transition:all 0.2s}
.icon-btn:hover{background:#3A3A3C;color:#FFF;transform:scale(1.1)}
.icon-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style></head><body>
<h1>Circular + Button on Cards</h1>

<!-- Card 1: Default state -->
<div class="stream-item">
  <div class="specs-col"><div class="start-time">7p</div><div class="stage-time">5 min</div></div>
  <div class="info-col">
    <div class="venue-row">
      <div class="venue-name">Creek & The Cave</div>
      <span class="tag-pill">QUEENS</span>
      <button class="add-btn" onclick="toggle(this)" title="Add to My Night">+</button>
    </div>
    <div class="meta-row">
      <span class="neighborhood">LONG ISLAND CITY</span><span class="meta-dot">&middot;</span><span class="price-badge">FREE</span>
    </div>
  </div>
  <div class="action-col">
    <a href="#" class="icon-btn" title="Website"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>
  </div>
</div>

<!-- Card 2: Live mic -->
<div class="stream-item">
  <div class="specs-col"><div class="start-time"><span class="live-dot"></span>6:30p</div><div class="stage-time">5 min</div></div>
  <div class="info-col">
    <div class="venue-row">
      <div class="venue-name">St. Marks Comedy Club</div>
      <span class="tag-pill">MANHATTAN</span>
      <button class="add-btn" onclick="toggle(this)" title="Add to My Night">+</button>
    </div>
    <div class="meta-row">
      <span class="neighborhood">EAST VILLAGE</span><span class="meta-dot">&middot;</span><span class="price-badge">$10</span>
    </div>
  </div>
  <div class="action-col">
    <a href="#" class="icon-btn" title="Instagram"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></a>
  </div>
</div>

<!-- Card 3: Pre-toggled (already added) -->
<div class="stream-item" style="background:rgba(34,197,94,0.06);border-left:3px solid #16a34a">
  <div class="specs-col"><div class="start-time">9p</div><div class="stage-time">3 min</div></div>
  <div class="info-col">
    <div class="venue-row">
      <div class="venue-name">Tiny Cupboard</div>
      <span class="tag-pill">BROOKLYN</span>
      <button class="add-btn added" title="In My Night">&#10003;</button>
    </div>
    <div class="meta-row">
      <span class="neighborhood">WILLIAMSBURG</span><span class="meta-dot">&middot;</span><span class="price-badge">FREE (BUY SMTH)</span>
    </div>
  </div>
  <div class="action-col">
    <a href="#" class="icon-btn" title="Website"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>
  </div>
</div>

<script>
function toggle(btn) {
  if (btn.classList.contains('added')) return;
  btn.classList.add('added');
  btn.innerHTML = '&#10003;';
  // Green left border on parent card
  const card = btn.closest('.stream-item');
  card.style.background = 'rgba(34,197,94,0.06)';
  card.style.borderLeft = '3px solid #16a34a';
}
</script>
</body></html>

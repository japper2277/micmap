<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Option B: Add to Night Nudge</title>
<style>
*{box-sizing:border-box;margin:0}body{font-family:system-ui;background:#1a1a2e;display:flex;justify-content:center;padding:40px}
.phone{width:340px;height:620px;border:3px solid #333;border-radius:40px;overflow:hidden;background:#e8e4dc;position:relative}
.modal{position:absolute;bottom:0;left:0;right:0;background:#000;border-radius:20px 20px 0 0;padding:20px;color:#fff}
.modal h2{font-size:20px;font-weight:700;margin-bottom:2px}
.modal .sub{color:#888;font-size:13px;margin-bottom:14px}
.modal .tags{display:flex;gap:6px;margin-bottom:16px}
.modal .tag{background:#1c1c1e;border:1px solid #333;border-radius:8px;padding:4px 10px;font-size:12px;color:#aaa}
.nudge{display:none;background:#1c1c1e;border:1px solid rgba(244,63,94,.4);border-radius:14px;padding:12px 14px;margin-top:12px;
  animation:slideUp .3s cubic-bezier(.16,1,.3,1)}
.nudge.show{display:flex;align-items:center;justify-content:space-between}
.nudge span{font-size:14px;font-weight:500;color:#ccc}
.nudge button{background:#f43f5e;color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer}
.nudge button:active{transform:scale(.95);opacity:.8}
.added{display:none;color:#22c55e;font-size:13px;font-weight:600;margin-top:10px;text-align:center}
.added.show{display:block;animation:fadeIn .3s}
.hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#555;font-size:14px;text-align:center}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style></head><body>
<div class="phone">
<div class="hint">Tap modal below to simulate<br>opening a venue</div>
<div class="modal" onclick="showNudge()">
  <h2>St. Marks Comedy Club</h2>
  <div class="sub">East Village · 4:30 PM · 8 min walk</div>
  <div class="tags"><span class="tag">$10</span><span class="tag">Sign-up</span><span class="tag">Weekly</span></div>
  <div class="nudge" id="nudge">
    <span>Add to Your Night?</span>
    <button onclick="event.stopPropagation();addToNight()">+ Add</button>
  </div>
  <div class="added" id="added">Added to Your Night (1 stop)</div>
</div></div>
<script>
function showNudge(){document.getElementById('nudge').classList.add('show')}
function addToNight(){document.getElementById('nudge').style.display='none';document.getElementById('added').classList.add('show')}
</script></body></html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Add to Tonight – Tutorial Demo</title>wawtc
<style>
  * { margin:0; box-sizing:border-box; }
  body { font-family:-apple-system,system-ui,sans-serif; background:#1a1a2e; color:#fff; padding:20px; max-width:400px; margin:auto; }
  h3 { font-size:13px; color:#888; text-transform:uppercase; letter-spacing:1px; margin:16px 0 8px; }

  .card { background:#262640; border-radius:14px; padding:14px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .card-info span { display:block; }
  .venue { font-weight:600; font-size:15px; }
  .time { color:#aaa; font-size:13px; margin-top:2px; }
  .tag { display:inline-block; font-size:11px; background:#333; border-radius:6px; padding:2px 8px; margin-top:6px; color:#ccc; }

  .add-btn { width:38px; height:38px; border-radius:50%; border:2px solid #555; background:transparent; color:#fff; font-size:22px; cursor:pointer; transition:all .2s; flex-shrink:0; position:relative; }
  .add-btn:hover { border-color:#4ade80; color:#4ade80; }
  .add-btn.added { background:#4ade80; border-color:#4ade80; color:#1a1a2e; pointer-events:none; }

  /* Pulse ring on the tutorial target */
  .pulse-wrap { position:relative; }
  .pulse-wrap::before, .pulse-wrap::after { content:''; position:absolute; inset:-6px; border-radius:50%; border:2px solid #4ade80; opacity:0; }
  .pulse-wrap::before { animation:pulse 2s ease-out infinite; }
  .pulse-wrap::after  { animation:pulse 2s ease-out infinite .6s; }
  @keyframes pulse { 0%{transform:scale(.85);opacity:.7} 100%{transform:scale(1.4);opacity:0} }

  /* Tooltip */
  .tooltip { position:absolute; bottom:52px; right:-8px; background:#fff; color:#111; font-size:13px; padding:8px 12px; border-radius:10px; width:200px; box-shadow:0 4px 20px rgba(0,0,0,.4); opacity:0; transform:translateY(6px); transition:all .3s; pointer-events:none; }
  .tooltip::after { content:''; position:absolute; bottom:-6px; right:24px; width:12px; height:12px; background:#fff; transform:rotate(45deg); }
  .tooltip.show { opacity:1; transform:translateY(0); }

  /* Toast */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(60px); background:#4ade80; color:#111; padding:10px 20px; border-radius:20px; font-size:14px; font-weight:600; transition:transform .3s; }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<h3>Happening Now</h3>
<div class="card">
  <div class="card-info">
    <span class="venue">East Village Comedy</span>
    <span class="time">7:00 PM · Free</span>
    <span class="tag">🟢 Live</span>
  </div>
  <div style="position:relative">
    <div class="pulse-wrap" id="pulseWrap">
      <button class="add-btn" onclick="handleAdd(this)">+</button>
    </div>
    <div class="tooltip" id="tooltip">Tap <b>+</b> to build your lineup for tonight</div>
  </div>
</div>

<div class="card">
  <div class="card-info">
    <span class="venue">Creek & The Cave</span>
    <span class="time">8:00 PM · $5</span>
    <span class="tag">⏳ 45 min</span>
  </div>
  <button class="add-btn" onclick="handleAdd(this)">+</button>
</div>

<div class="card">
  <div class="card-info">
    <span class="venue">Tiny Cupboard</span>
    <span class="time">9:30 PM · Free</span>
    <span class="tag">Tonight</span>
  </div>
  <button class="add-btn" onclick="handleAdd(this)">+</button>
</div>

<div class="toast" id="toast"></div>

<script>
  // Show tooltip after a beat
  setTimeout(() => document.getElementById('tooltip').classList.add('show'), 800);

  function dismissTutorial() {
    document.getElementById('tooltip').classList.remove('show');
    document.getElementById('pulseWrap').classList.remove('pulse-wrap');
  }

  function handleAdd(btn) {
    dismissTutorial();
    if (btn.classList.contains('added')) return;
    btn.classList.add('added');
    btn.textContent = '✓';
    // Toast
    const name = btn.closest('.card').querySelector('.venue').textContent;
    const t = document.getElementById('toast');
    t.textContent = `Added ${name}`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  // Dismiss tooltip on any tap outside
  document.addEventListener('click', e => {
    if (!e.target.closest('.add-btn')) dismissTutorial();
  });
</script>
</body>
</html>

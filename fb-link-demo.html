<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Link Demo</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #e8e4dc;
            height: 100vh;
        }

        /* Simulated map background */
        .map-bg {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(90deg, #ddd 1px, transparent 1px),
                linear-gradient(#ddd 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.5;
        }

        h2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 14px;
        }

        /* === OPTION A: Pill with icon + text === */
        .fb-link-a {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .fb-link-a:hover {
            background: rgba(9, 9, 11, 0.95);
            transform: translateY(-1px);
        }
        .fb-link-a svg {
            fill: #1877F2;
        }

        /* === OPTION B: Icon only (minimal) === */
        .fb-link-b {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .fb-link-b:hover {
            background: rgba(9, 9, 11, 0.95);
            transform: translateY(-1px);
        }
        .fb-link-b svg {
            fill: #1877F2;
        }

        /* === OPTION C: Smaller pill === */
        .fb-link-c {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .fb-link-c:hover {
            background: rgba(9, 9, 11, 0.95);
        }
        .fb-link-c svg {
            fill: #1877F2;
        }

        /* Demo layout */
        .demo-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            height: 100vh;
            gap: 2px;
            background: #333;
        }
        .demo-panel {
            position: relative;
            background: #e8e4dc;
        }
        .demo-panel .map-bg {
            position: absolute;
            inset: 0;
        }
        .label {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <!-- Option A -->
        <div class="demo-panel">
            <div class="map-bg"></div>
            <a href="#" class="fb-link-a">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                <span>NYC Comedy Scene</span>
            </a>
            <div class="label">A: Pill with text</div>
        </div>

        <!-- Option B -->
        <div class="demo-panel">
            <div class="map-bg"></div>
            <a href="#" class="fb-link-b">
                <svg width="22" height="22" viewBox="0 0 24 24">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
            </a>
            <div class="label">B: Icon only</div>
        </div>

        <!-- Option C -->
        <div class="demo-panel">
            <div class="map-bg"></div>
            <a href="#" class="fb-link-c">
                <svg width="14" height="14" viewBox="0 0 24 24">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                <span>Community</span>
            </a>
            <div class="label">C: Small pill</div>
        </div>
    </div>
</body>
</html>

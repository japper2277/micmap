<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 600px;
    height: 315px;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
    overflow: hidden;
    position: relative;
  }

  .glow {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(239,68,68,0.12) 0%, transparent 70%);
    border-radius: 50%;
    right: 80px;
  }

  .left {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    z-index: 1;
  }

  .logo-circle {
    width: 44px;
    height: 44px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .logo-text {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: -0.3px;
  }

  .right {
    z-index: 1;
    text-align: left;
  }

  .number {
    font-size: 120px;
    font-weight: 800;
    color: white;
    line-height: 1;
    letter-spacing: -5px;
  }

  .plus { color: #ef4444; }

  .label {
    font-size: 18px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-top: 2px;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="left">
    <div class="logo-circle">🎤</div>
    <div class="logo-text">MicFinder</div>
  </div>
  <div class="right">
    <div class="number">100<span class="plus">+</span></div>
    <div class="label">Downloads</div>
  </div>
</body>
</html>

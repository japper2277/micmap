<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plan Your Mic Crawl - MicFinder NYC</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <!-- Custom Styles -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* MAP CONTAINER - FULL SCREEN */
        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* TOP BAR - Filters & Controls */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .top-bar-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .app-title {
            font-size: 18px;
            font-weight: 700;
            color: #dc2626;
            white-space: nowrap;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            flex: 1;
        }

        .filter-btn {
            height: 40px;
            padding: 0 16px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .filter-btn:hover {
            border-color: #dc2626;
            color: #dc2626;
        }

        .filter-btn.active {
            background: #dc2626;
            border-color: #dc2626;
            color: white;
        }

        .mode-toggle-btn {
            height: 40px;
            padding: 0 20px;
            background: #dc2626;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(220, 38, 38, 0.3);
        }

        .mode-toggle-btn:hover {
            background: #b91c1c;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.4);
        }

        .mode-toggle-btn.active {
            background: #15803d;
        }

        /* BOTTOM SHEET - Mic Details & Route */
        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: white;
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.1);
            transform: translateY(calc(100% - 80px));
            transition: transform 0.3s ease;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
        }

        .bottom-sheet.peek {
            transform: translateY(calc(100% - 80px));
        }

        .bottom-sheet.half {
            transform: translateY(50%);
        }

        .bottom-sheet.full {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: #d1d5db;
            border-radius: 2px;
            margin: 12px auto 8px;
            cursor: grab;
        }

        .sheet-header {
            padding: 0 16px 12px;
            border-bottom: 1px solid #e5e7eb;
        }

        .sheet-title {
            font-size: 16px;
            font-weight: 700;
            color: #111827;
        }

        .sheet-subtitle {
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
        }

        .sheet-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        /* MIC CARD */
        .mic-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mic-card:hover {
            border-color: #dc2626;
            box-shadow: 0 2px 8px rgba(220, 38, 38, 0.1);
        }

        .mic-card.selected {
            border-color: #dc2626;
            background: #fef2f2;
        }

        .mic-time {
            font-size: 14px;
            font-weight: 700;
            color: #dc2626;
            margin-bottom: 4px;
        }

        .mic-venue {
            font-size: 16px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 4px;
        }

        .mic-location {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .mic-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .mic-tag {
            font-size: 11px;
            padding: 4px 8px;
            background: #f3f4f6;
            border-radius: 4px;
            color: #4b5563;
        }

        .mic-tag.free {
            background: #d1fae5;
            color: #065f46;
        }

        .mic-tag.live {
            background: #fecaca;
            color: #991b1b;
        }

        /* ROUTE PANEL */
        .route-panel {
            display: none;
        }

        .route-panel.active {
            display: block;
        }

        .route-summary {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            border-radius: 12px;
            padding: 16px;
            color: white;
            margin-bottom: 16px;
        }

        .route-stat {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .route-label {
            font-size: 13px;
            opacity: 0.9;
        }

        .route-stops {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .route-stop {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: grab;
        }

        .route-stop:active {
            cursor: grabbing;
        }

        .route-stop-number {
            width: 32px;
            height: 32px;
            background: #dc2626;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .route-stop-details {
            flex: 1;
            min-width: 0;
        }

        .route-stop-time {
            font-size: 13px;
            font-weight: 700;
            color: #dc2626;
        }

        .route-stop-venue {
            font-size: 14px;
            font-weight: 600;
            color: #111827;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .route-stop-remove {
            width: 32px;
            height: 32px;
            background: #fef2f2;
            color: #dc2626;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .route-stop-remove:hover {
            background: #fee2e2;
        }

        /* LOADING STATE */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f4f6;
            border-top-color: #dc2626;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* MOBILE RESPONSIVE */
        @media (min-width: 768px) {
            .bottom-sheet {
                left: auto;
                width: 400px;
                border-radius: 0;
                transform: translateX(0);
                max-height: 100vh;
            }

            .bottom-sheet.peek,
            .bottom-sheet.half,
            .bottom-sheet.full {
                transform: translateX(0);
            }

            .sheet-handle {
                display: none;
            }
        }

        @media (max-width: 767px) {
            .app-title {
                font-size: 16px;
            }

            .filter-btn {
                height: 36px;
                padding: 0 12px;
                font-size: 13px;
            }

            .mode-toggle-btn {
                height: 36px;
                padding: 0 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- MAP -->
    <div id="map"></div>

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-bar-content">
            <div class="app-title">MicFinder</div>

            <div class="filter-group">
                <button class="filter-btn active" data-filter="day">Today</button>
                <button class="filter-btn" data-filter="time">All Times</button>
                <button class="filter-btn" data-filter="price">All Prices</button>
                <button class="filter-btn" data-filter="borough">All Boroughs</button>
            </div>

            <button class="mode-toggle-btn" id="planModeBtn">
                🗺️ Plan Route
            </button>
        </div>
    </div>

    <!-- BOTTOM SHEET -->
    <div class="bottom-sheet peek" id="bottomSheet">
        <div class="sheet-handle" id="sheetHandle"></div>

        <div class="sheet-header">
            <div class="sheet-title" id="sheetTitle">Open Mics Tonight</div>
            <div class="sheet-subtitle" id="sheetSubtitle">Tap a mic to add to your route</div>
        </div>

        <div class="sheet-content">
            <!-- MIC LIST VIEW -->
            <div id="micList" class="mic-list">
                <!-- Mics will be rendered here -->
            </div>

            <!-- ROUTE PANEL (hidden by default) -->
            <div id="routePanel" class="route-panel">
                <div class="route-summary">
                    <div class="route-stat" id="routeDuration">0h 0m</div>
                    <div class="route-label">Total trip time • <span id="routeDistance">0 mi</span></div>
                </div>

                <div class="route-stops" id="routeStops">
                    <!-- Route stops will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- LOADING OVERLAY -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- App Logic -->
    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const CONFIG = {
            API_BASE: 'https://micmap-production.up.railway.app',
            MAP_CENTER: [40.7128, -73.99],
            MAP_ZOOM: 13,
            LINE_COLORS: {
                '1': '#EE352E', '2': '#EE352E', '3': '#EE352E',
                'A': '#0039A6', 'C': '#0039A6', 'E': '#0039A6',
                'L': '#A7A9AC', 'G': '#6CBE45', 'F': '#FF6319',
                'N': '#FCCC0A', 'Q': '#FCCC0A', 'R': '#FCCC0A'
            }
        };

        // ============================================
        // STATE
        // ============================================
        const STATE = {
            mics: [],
            filteredMics: [],
            selectedMics: [],
            isPlanMode: false,
            filters: {
                day: 'today',
                time: 'all',
                price: 'all',
                borough: 'all'
            },
            map: null,
            markers: null,
            sheetState: 'peek'
        };

        // ============================================
        // INITIALIZE
        // ============================================
        async function init() {
            console.log('🚀 Initializing Map Planner v2...');

            // Initialize map
            initMap();

            // Load data
            await loadMics();

            // Setup UI
            setupEventListeners();

            // Hide loading
            document.getElementById('loadingOverlay').style.display = 'none';

            console.log('✅ Initialization complete');
        }

        // ============================================
        // MAP
        // ============================================
        function initMap() {
            STATE.map = L.map('map', {
                center: CONFIG.MAP_CENTER,
                zoom: CONFIG.MAP_ZOOM,
                zoomControl: false
            });

            // Dark mode tiles
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap contributors, © CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(STATE.map);

            // Add zoom control to bottom right
            L.control.zoom({ position: 'bottomright' }).addTo(STATE.map);

            // Initialize marker cluster group
            STATE.markers = L.markerClusterGroup({
                maxClusterRadius: 50,
                spiderfyOnMaxZoom: true,
                showCoverageOnHover: false,
                zoomToBoundsOnClick: true
            });
            STATE.map.addLayer(STATE.markers);
        }

        function createMicMarker(mic) {
            const lat = mic.lat || mic.latitude;
            const lng = mic.lng || mic.longitude || mic.lon;

            if (!lat || !lng) return null;

            // Determine marker color based on status
            let markerColor = '#6b7280'; // default gray
            if (mic.status === 'live') markerColor = '#22c55e'; // green
            else if (mic.status === 'upcoming') markerColor = '#dc2626'; // red

            const markerHtml = `
                <div style="
                    width: 32px;
                    height: 32px;
                    background: ${markerColor};
                    border: 3px solid white;
                    border-radius: 50%;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    cursor: pointer;
                    font-size: 16px;
                ">
                    🎤
                </div>
            `;

            const marker = L.marker([lat, lng], {
                icon: L.divIcon({
                    className: 'mic-marker',
                    html: markerHtml,
                    iconSize: [32, 32],
                    iconAnchor: [16, 16]
                })
            });

            marker.on('click', () => handleMicClick(mic));

            return marker;
        }

        function updateMapMarkers() {
            STATE.markers.clearLayers();

            STATE.filteredMics.forEach(mic => {
                const marker = createMicMarker(mic);
                if (marker) {
                    STATE.markers.addLayer(marker);
                }
            });
        }

        // ============================================
        // DATA LOADING
        // ============================================
        async function loadMics() {
            try {
                console.log('📡 Loading mics from API...');
                const response = await fetch(`${CONFIG.API_BASE}/api/v1/mics`);
                const data = await response.json();

                STATE.mics = processMics(data.mics || []);
                applyFilters();

                console.log(`✅ Loaded ${STATE.mics.length} mics`);
            } catch (error) {
                console.error('❌ Error loading mics:', error);
            }
        }

        function processMics(rawMics) {
            const now = new Date();
            const currentDay = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][now.getDay()];
            const currentMins = now.getHours() * 60 + now.getMinutes();

            return rawMics.map(mic => {
                // Parse time
                let startMins = 0;
                if (mic.time) {
                    const match = mic.time.match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
                    if (match) {
                        let hours = parseInt(match[1]);
                        const mins = parseInt(match[2]);
                        const ampm = match[3];

                        if (ampm && ampm.toUpperCase() === 'PM' && hours !== 12) hours += 12;
                        if (ampm && ampm.toUpperCase() === 'AM' && hours === 12) hours = 0;

                        startMins = hours * 60 + mins;
                    }
                }

                // Calculate status
                let status = 'future';
                if (mic.day === currentDay) {
                    const diff = currentMins - startMins;
                    if (diff > -120 && diff < 0) status = 'upcoming'; // within 2 hours
                    else if (diff >= 0 && diff < 90) status = 'live'; // started within 90 mins
                }

                return {
                    ...mic,
                    id: mic._id || mic.id || `mic_${Math.random()}`,
                    startMins,
                    status,
                    venueName: mic.venueName || mic.venue,
                    lat: mic.lat || mic.latitude,
                    lng: mic.lng || mic.longitude || mic.lon,
                    cost: parseFloat(mic.cost || mic.price || 0)
                };
            });
        }

        // ============================================
        // FILTERS
        // ============================================
        function applyFilters() {
            const now = new Date();
            const currentDay = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][now.getDay()];
            const currentMins = now.getHours() * 60 + now.getMinutes();

            STATE.filteredMics = STATE.mics.filter(mic => {
                // Day filter
                if (STATE.filters.day === 'today' && mic.day !== currentDay) return false;
                if (STATE.filters.day === 'tomorrow') {
                    const tomorrow = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][(now.getDay() + 1) % 7];
                    if (mic.day !== tomorrow) return false;
                }

                // Time filter (only if today)
                if (STATE.filters.day === 'today') {
                    if (STATE.filters.time === 'evening' && (mic.startMins < 1020 || mic.startMins > 1260)) return false; // 5pm-9pm
                    if (STATE.filters.time === 'late' && mic.startMins < 1260) return false; // after 9pm

                    // Hide if started more than 30 mins ago
                    if (mic.startMins < currentMins - 30) return false;
                }

                // Price filter
                if (STATE.filters.price === 'free' && mic.cost > 0) return false;

                // Borough filter
                if (STATE.filters.borough !== 'all' && mic.borough !== STATE.filters.borough) return false;

                return true;
            });

            // Sort by time
            STATE.filteredMics.sort((a, b) => a.startMins - b.startMins);

            updateMapMarkers();
            renderMicList();
        }

        // ============================================
        // UI RENDERING
        // ============================================
        function renderMicList() {
            const container = document.getElementById('micList');

            if (STATE.filteredMics.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #6b7280; padding: 40px 0;">No mics found matching filters</p>';
                return;
            }

            container.innerHTML = STATE.filteredMics.map(mic => {
                const isSelected = STATE.selectedMics.some(m => m.id === mic.id);

                return `
                    <div class="mic-card ${isSelected ? 'selected' : ''}" data-mic-id="${mic.id}">
                        <div class="mic-time">${formatTime(mic.startMins)}</div>
                        <div class="mic-venue">${mic.venueName || 'Unknown Venue'}</div>
                        <div class="mic-location">
                            ${mic.neighborhood || mic.borough || 'NYC'}
                        </div>
                        <div class="mic-tags">
                            ${mic.cost === 0 ? '<span class="mic-tag free">Free</span>' : `<span class="mic-tag">$${mic.cost}</span>`}
                            ${mic.status === 'live' ? '<span class="mic-tag live">Live Now</span>' : ''}
                            ${mic.status === 'upcoming' ? '<span class="mic-tag">Starting Soon</span>' : ''}
                        </div>
                    </div>
                `;
            }).join('');

            // Add click listeners
            container.querySelectorAll('.mic-card').forEach(card => {
                card.addEventListener('click', () => {
                    const micId = card.dataset.micId;
                    const mic = STATE.filteredMics.find(m => m.id === micId);
                    if (mic) handleMicClick(mic);
                });
            });
        }

        function handleMicClick(mic) {
            if (!STATE.isPlanMode) {
                // Just show details (future: open detail modal)
                console.log('Clicked mic:', mic.venueName);
                return;
            }

            // Plan mode: add/remove from route
            const index = STATE.selectedMics.findIndex(m => m.id === mic.id);

            if (index >= 0) {
                // Remove from route
                STATE.selectedMics.splice(index, 1);
            } else {
                // Add to route
                STATE.selectedMics.push(mic);
                STATE.selectedMics.sort((a, b) => a.startMins - b.startMins);
            }

            renderMicList();
            renderRoute();
        }

        function renderRoute() {
            if (STATE.selectedMics.length === 0) {
                document.getElementById('routePanel').classList.remove('active');
                return;
            }

            document.getElementById('routePanel').classList.add('active');

            // Calculate route stats
            const totalDuration = STATE.selectedMics.length * 60; // 60 mins per venue
            const hours = Math.floor(totalDuration / 60);
            const mins = totalDuration % 60;

            document.getElementById('routeDuration').textContent = `${hours}h ${mins}m`;

            // Render stops
            const container = document.getElementById('routeStops');
            container.innerHTML = STATE.selectedMics.map((mic, index) => `
                <div class="route-stop" data-mic-id="${mic.id}">
                    <div class="route-stop-number">${index + 1}</div>
                    <div class="route-stop-details">
                        <div class="route-stop-time">${formatTime(mic.startMins)}</div>
                        <div class="route-stop-venue">${mic.venueName}</div>
                    </div>
                    <button class="route-stop-remove" data-mic-id="${mic.id}">×</button>
                </div>
            `).join('');

            // Add remove listeners
            container.querySelectorAll('.route-stop-remove').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const micId = btn.dataset.micId;
                    STATE.selectedMics = STATE.selectedMics.filter(m => m.id !== micId);
                    renderMicList();
                    renderRoute();
                });
            });
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        function setupEventListeners() {
            // Plan mode toggle
            document.getElementById('planModeBtn').addEventListener('click', () => {
                STATE.isPlanMode = !STATE.isPlanMode;
                const btn = document.getElementById('planModeBtn');

                if (STATE.isPlanMode) {
                    btn.classList.add('active');
                    btn.textContent = '✓ Planning Mode';
                    document.getElementById('sheetSubtitle').textContent = 'Tap mics to build your route';
                    document.getElementById('micList').style.display = 'none';
                    document.getElementById('routePanel').classList.add('active');
                } else {
                    btn.classList.remove('active');
                    btn.textContent = '🗺️ Plan Route';
                    document.getElementById('sheetSubtitle').textContent = 'Tap a mic to add to your route';
                    document.getElementById('micList').style.display = 'block';
                    if (STATE.selectedMics.length === 0) {
                        document.getElementById('routePanel').classList.remove('active');
                    }
                }
            });

            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    // TODO: Implement filter logic
                    console.log('Filter clicked:', btn.dataset.filter);
                });
            });

            // Bottom sheet drag
            const handle = document.getElementById('sheetHandle');
            const sheet = document.getElementById('bottomSheet');

            let startY = 0;
            let currentY = 0;

            handle.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
            });

            handle.addEventListener('touchmove', (e) => {
                currentY = e.touches[0].clientY;
                const diff = currentY - startY;

                // Implement drag logic (simplified)
                if (diff > 100) {
                    sheet.classList.remove('half', 'full');
                    sheet.classList.add('peek');
                } else if (diff < -100) {
                    sheet.classList.remove('peek', 'half');
                    sheet.classList.add('full');
                }
            });
        }

        // ============================================
        // UTILITIES
        // ============================================
        function formatTime(mins) {
            const hours = Math.floor(mins / 60);
            const minutes = mins % 60;
            const ampm = hours >= 12 ? 'PM' : 'AM';
            const displayHours = hours % 12 || 12;
            return `${displayHours}:${minutes.toString().padStart(2, '0')} ${ampm}`;
        }

        // ============================================
        // START APP
        // ============================================
        init();
    </script>
</body>
</html>
